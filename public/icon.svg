<svg width="180" height="180" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
    }
  </style>
  <!-- Monograma Décima: la "d" minúscula representada como una corchea
       (nota musical ♪) — el óvalo hace de bowl de la "d" y la plica con
       bandera la distingue como nota. El rojo escarlata neón se mantiene
       fijo en ambos esquemas — solo el fondo invierte negro/blanco para
       legibilidad. -->
  <rect class="background" width="100" height="100" rx="22" />
  <rect x="56" y="16" width="9" height="58" rx="4.5" fill="#FF2440" />
  <ellipse cx="46" cy="76" rx="18" ry="13" transform="rotate(-20 46 76)" fill="#FF2440" />
  <path d="M65,16 C82,20 90,34 84,48 C81,38 74,30 65,32 Z" fill="#FF2440" />
</svg>
