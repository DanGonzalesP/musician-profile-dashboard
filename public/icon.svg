<svg width="180" height="180" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: black; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: white; }
    }
  </style>
  <!-- Monograma décima (rediseño): la "d" minúscula dibujada en trazo
       geométrico y, debajo, el pulso de ecualizador de cinco barras que
       firma toda la marca (el mismo de components/logo.tsx). El rojo
       escarlata neón se mantiene fijo en ambos esquemas — solo el fondo
       invierte negro/blanco para legibilidad. -->
  <rect class="background" width="100" height="100" rx="22" />
  <circle cx="44" cy="52" r="14" stroke="#FF2440" stroke-width="9" fill="none" />
  <rect x="53.5" y="14" width="9" height="52" rx="4.5" fill="#FF2440" />
  <g fill="#FF2440">
    <rect x="22" y="82" width="6" height="8" rx="3" />
    <rect x="34" y="76" width="6" height="14" rx="3" />
    <rect x="46" y="80" width="6" height="10" rx="3" />
    <rect x="58" y="72" width="6" height="18" rx="3" />
    <rect x="70" y="79" width="6" height="11" rx="3" />
  </g>
</svg>
